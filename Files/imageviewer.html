<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Image Viewer</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<style>
  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #f5f5f5;
    color: #333;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  /* Drop zone */
  #drop-zone {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    cursor: pointer;
    z-index: 10;
    color: #999;
    transition: background 0.15s;
  }
  #drop-zone.drag-over {
    background: rgba(0,0,0,0.04);
    color: #333;
  }
  #drop-zone .icon { font-size: 48px; opacity: 0.4; }
  #drop-zone .hint { font-size: 14px; opacity: 0.4; }
  #drop-zone input[type=file] { display: none; }

  /* Viewer */
  #viewer {
    display: none;
    height: 100%;
    overflow-y: scroll;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: #ccc #f5f5f5;
  }
  #viewer::-webkit-scrollbar { width: 8px; }
  #viewer::-webkit-scrollbar-track { background: #f5f5f5; }
  #viewer::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 0;
    gap: 8px;
  }

  #container img {
    display: block;
    max-width: min(95vw, 1200px);
    width: auto;
    height: auto;
    background: #fff;
    box-shadow: 0 1px 8px rgba(0,0,0,0.12);
    border-radius: 2px;
  }

  /* Toolbar */
  #toolbar {
    display: none;
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 20;
    gap: 8px;
    flex-direction: column;
    align-items: flex-end;
  }
  #toolbar button {
    width: 40px; height: 40px;
    border: 1px solid #ddd;
    border-radius: 50%;
    background: #fff;
    color: #666;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  #toolbar button:hover { background: #eee; color: #333; }

  /* Page counter */
  #counter {
    display: none;
    position: fixed;
    top: 12px;
    right: 16px;
    font-size: 13px;
    color: #999;
    z-index: 20;
    background: rgba(255,255,255,0.85);
    padding: 4px 10px;
    border-radius: 10px;
    pointer-events: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  /* Scroll progress */
  #scroll-bar {
    position: fixed;
    top: 0; right: 0;
    width: 3px; height: 0%;
    background: rgba(0,0,0,0.18);
    z-index: 21;
    pointer-events: none;
    border-radius: 0 0 0 2px;
    transition: height 0.1s linear;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="drop-zone">
  <div class="icon">&#128444;</div>
  <div>Click to select images, or drag and drop a folder here</div>
  <div class="hint">Multi-select &middot; Arrow keys to scroll &middot; Space/Shift+Space to page</div>
  <input type="file" id="file-input" multiple accept="image/*" />
</div>

<div id="viewer">
  <div id="container"></div>
</div>

<div id="counter"></div>
<div id="scroll-bar"></div>

<div id="toolbar">
  <button id="btn-up" title="Scroll to top">&#8593;</button>
  <button id="btn-down" title="Scroll to bottom">&#8595;</button>
  <button id="btn-open" title="Open other images">&#128193;</button>
</div>

<input type="file" id="hidden-input" multiple accept="image/*" style="display:none" />

<script>
const $ = s => document.querySelector(s);

const dropZone  = $('#drop-zone');
const fileInput = $('#file-input');
const hiddenInput = $('#hidden-input');
const viewer    = $('#viewer');
const container = $('#container');
const counter   = $('#counter');
const toolbar   = $('#toolbar');
const scrollBar = $('#scroll-bar');
let imgs = [];

// --- Load files ---
function loadFiles(files) {
  const sorted = Array.from(files)
    .filter(f => f.type.startsWith('image/'))
    .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

  if (!sorted.length) return;
  imgs = sorted;
  renderAll();
  dropZone.classList.add('hidden');
  viewer.style.display = 'block';
  toolbar.style.display = 'flex';
  counter.style.display = '';
  viewer.scrollTop = 0;
}

function renderAll() {
  container.innerHTML = '';
  counter.textContent = imgs.length + ' images';
  imgs.forEach((file, i) => {
    const url = URL.createObjectURL(file);
    const img = document.createElement('img');
    img.src = url;
    img.alt = file.name;
    img.title = (i + 1) + ' / ' + imgs.length + '  ' + file.name;
    container.appendChild(img);
  });
}

// --- File input ---
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => loadFiles(fileInput.files));

// --- Drag & drop ---
document.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
document.addEventListener('dragleave', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); });
document.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) loadFiles(e.dataTransfer.files);
});

// --- Paste from clipboard ---
document.addEventListener('paste', e => {
  if (e.clipboardData.files.length) {
    e.preventDefault();
    loadFiles(e.clipboardData.files);
  }
});

// --- Scroll progress ---
viewer.addEventListener('scroll', () => {
  const max = viewer.scrollHeight - viewer.clientHeight;
  const pct = max > 0 ? viewer.scrollTop / max * 100 : 0;
  scrollBar.style.height = Math.min(100, Math.max(0, pct)) + '%';
});

// --- Keyboard navigation ---
document.addEventListener('keydown', e => {
  if (!imgs.length) return;

  const vh = viewer.clientHeight;
  const gap = 8;
  const step = vh * 0.85;

  switch (e.key) {
    case 'ArrowDown':
    case 'j':
      e.preventDefault();
      viewer.scrollBy({ top: step - gap, behavior: 'smooth' });
      break;
    case 'ArrowUp':
    case 'k':
      e.preventDefault();
      viewer.scrollBy({ top: -(step - gap), behavior: 'smooth' });
      break;
    case ' ':
      e.preventDefault();
      viewer.scrollBy({ top: e.shiftKey ? -(vh - 80) : (vh - 80), behavior: 'smooth' });
      break;
    case 'PageDown':
      e.preventDefault();
      viewer.scrollBy({ top: vh - 40, behavior: 'smooth' });
      break;
    case 'PageUp':
      e.preventDefault();
      viewer.scrollBy({ top: -(vh - 40), behavior: 'smooth' });
      break;
    case 'Home':
      e.preventDefault();
      viewer.scrollTo({ top: 0, behavior: 'smooth' });
      break;
    case 'End':
      e.preventDefault();
      viewer.scrollTo({ top: viewer.scrollHeight, behavior: 'smooth' });
      break;
    case 'g':
      if (!e.ctrlKey && !e.metaKey && !e.altKey) {
        e.preventDefault();
        viewer.scrollTo({ top: 0, behavior: 'smooth' });
      }
      break;
    case 'G':
      if (e.shiftKey && !e.ctrlKey && !e.metaKey && !e.altKey) {
        e.preventDefault();
        viewer.scrollTo({ top: viewer.scrollHeight, behavior: 'smooth' });
      }
      break;
  }
});

// --- Buttons ---
$('#btn-up').addEventListener('click', () => viewer.scrollTo({ top: 0, behavior: 'smooth' }));
$('#btn-down').addEventListener('click', () => viewer.scrollTo({ top: viewer.scrollHeight, behavior: 'smooth' }));
$('#btn-open').addEventListener('click', () => {
  hiddenInput.click();
  hiddenInput.onchange = () => { container.innerHTML = ''; loadFiles(hiddenInput.files); };
});

// --- Click left/right edge to scroll ---
viewer.addEventListener('click', e => {
  const x = e.clientX, w = window.innerWidth;
  const vh = viewer.clientHeight;
  if (x > w * 0.7) {
    viewer.scrollBy({ top: vh * 0.85, behavior: 'smooth' });
  } else if (x < w * 0.3) {
    viewer.scrollBy({ top: -vh * 0.85, behavior: 'smooth' });
  }
});
</script>
</body>
</html>
